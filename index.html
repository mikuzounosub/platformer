<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌋 火山島からの脱出 (完全全画面版)</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Courier New', Courier, monospace;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        /* ゲームコンテナをブラウザ全画面に固定 */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #2d3436, #161625);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* UI */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
        }
        #msg-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        #msg-screen h2 { font-size: 36px; margin-top: 0; color: #e74c3c; }
        #msg-screen p { font-size: 16px; color: #ccc; line-height: 1.6; }
        button {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        button:hover { background: #c0392b; }
        /* コントローラー (スマホ・タブレット用) */
        #controller {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            z-index: 15;
            display: none; /* JSでタッチデバイス判定して表示 */
        }
        .btn-group { display: flex; gap: 20px; }
        .btn {
            background: rgba(80, 80, 80, 0.7);
            border: 2px solid #aaa;
            color: white;
            width: 70px; height: 70px;
            border-radius: 14px;
            display: flex; justify-content: center; align-items: center;
            font-size: 32px; font-weight: bold;
            touch-action: none;
        }
        .btn:active { background: rgba(150, 150, 150, 0.9); }
        #btn-jump {
            background: rgba(52, 152, 219, 0.7);
            border-color: #3498db;
            width: 80px;
        }
        #btn-jump:active { background: rgba(41, 128, 185, 0.9); }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div>☠ DEATHS: <span id="death-count">0</span></div>
        </div>

        <div id="msg-screen">
            <h2 id="msg-title">HARD PLATFORMER</h2>
            <p id="msg-body">操作: ← → 移動 / ↑ ジャンプ (空中でもう1回可)<br>壁に張り付いている時に ↑ で壁キック！</p>
            <button id="start-btn" onclick="startGame()">START</button>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="controller">
            <div class="btn-group">
                <div class="btn" id="btn-left">←</div>
                <div class="btn" id="btn-right">→</div>
            </div>
            <div class="btn" id="btn-jump">↑</div>
        </div>
    </div>

    <script>
        // --- 定数・設定 ---
        const GameState = { START: 0, PLAYING: 1, CLEAR: 2 };
        let currentGameState = GameState.START;
        
        // 物理演算用の内部基準高さ（縦の解像度は一律450として計算し、横幅を画面に合わせて広げます）
        const V_HEIGHT = 450;
        let vWidth = 800; // 画面比率によって動的に変わります
        
        const GRAVITY = 0.8;
        const MOVE_SPEED = 5;
        const JUMP_FORCE = -14.5;
        const WALL_KICK_VX = 7.5;
        const WALL_KICK_VY = -12;
        const TERMINAL_VELOCITY = 15;
        
        // カラーパレット
        const COL_PLY = '#3498db';
        const COL_GRD = '#2d3436';
        const COL_GRD_T = '#636e72';
        const COL_SPK = '#e74c3c';
        const COL_BG = '#161625';
        const COL_FLG_B = '#f1c40f';
        const COL_FLG_G = '#2ecc71';
        const COL_ENM = '#ff3300';
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiDeaths = document.getElementById('death-count');
        
        let player;
        let platforms = [];
        let spikes = [];
        let checkpoints = [];
        let enemies = [];
        let goal = null;
        
        let camera = { x: 0, y: 0 };
        let keys = {};
        let touchControls = { left: false, right: false };
        let deathCount = 0;
        let currentSpawnPoint = { x: 60, y: V_HEIGHT - 100 };
        let worldWidth = 3200; // ステージの全長

        // --- クラス定義 ---
        class Player {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.width = 24; this.height = 32;
                this.vx = 0; this.vy = 0;
                this.onGround = false;
                this.onWall = false;
                this.wallDir = 0;
                this.canDoubleJump = false;
                this.isDead = false;
            }

            update() {
                if (this.isDead) return;

                let moveDir = 0;
                if (keys['ArrowLeft'] || keys['a'] || touchControls.left) moveDir = -1;
                if (keys['ArrowRight'] || keys['d'] || touchControls.right) moveDir = 1;
                this.vx = moveDir * MOVE_SPEED;

                this.vy += GRAVITY;
                if (this.vy > TERMINAL_VELOCITY) this.vy = TERMINAL_VELOCITY;

                if (this.onWall && this.vy > 2) {
                    this.vy = 2; // 壁ずり落ち
                }

                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0) this.x = 0;
            }

            jump() {
                if (this.isDead) return;
                
                if (this.onGround) {
                    this.vy = JUMP_FORCE;
                    this.onGround = false;
                    this.canDoubleJump = true;
                    this.onWall = false;
                } 
                else if (this.onWall) {
                    this.vx = -this.wallDir * WALL_KICK_VX;
                    this.vy = WALL_KICK_VY;
                    this.onWall = false;
                    this.canDoubleJump = true;
                }
                else if (this.canDoubleJump) {
                    this.vy = JUMP_FORCE * 0.85;
                    this.canDoubleJump = false;
                }
            }

            draw(ctx, camX) {
                if (this.isDead) return;
                ctx.fillStyle = COL_PLY;
                ctx.fillRect(this.x - camX, this.y, this.width, this.height);
                
                // 目
                ctx.fillStyle = '#fff';
                let eyeX = (this.vx >= 0) ? 14 : 4;
                ctx.fillRect(this.x - camX + eyeX, this.y + 8, 6, 6);
            }
        }

        class Platform {
            constructor(x, y, w, h) { this.x = x; this.y = y; this.width = w; this.height = h; }
            draw(ctx, camX) {
                if (this.x + this.width < camX || this.x > camX + vWidth) return;
                ctx.fillStyle = COL_GRD;
                ctx.fillRect(this.x - camX, this.y, this.width, this.height);
                ctx.fillStyle = COL_GRD_T;
                ctx.fillRect(this.x - camX, this.y, this.width, 4);
            }
        }

        class Spike {
            constructor(x, y, count, dir = 'up') {
                this.x = x; this.y = y; this.count = count; this.dir = dir;
                this.size = 20;
                this.width = (dir === 'up' || dir === 'down') ? this.size * count : this.size;
                this.height = (dir === 'left' || dir === 'right') ? this.size * count : this.size;
            }
            draw(ctx, camX) {
                if (this.x + this.width < camX || this.x > camX + vWidth) return;
                ctx.fillStyle = COL_SPK;
                ctx.beginPath();
                for (let i = 0; i < this.count; i++) {
                    let px, py;
                    if (this.dir === 'up') {
                        px = this.x + (i * this.size); py = this.y + this.size;
                        ctx.moveTo(px - camX, py); ctx.lineTo(px + this.size/2 - camX, this.y); ctx.lineTo(px + this.size - camX, py);
                    } else if (this.dir === 'down') {
                        px = this.x + (i * this.size); py = this.y;
                        ctx.moveTo(px - camX, py); ctx.lineTo(px + this.size/2 - camX, this.y + this.size); ctx.lineTo(px + this.size - camX, py);
                    } else if (this.dir === 'left') {
                        px = this.x + this.size; py = this.y + (i * this.size);
                        ctx.moveTo(px - camX, py); ctx.lineTo(this.x - camX, py + this.size/2); ctx.lineTo(px - camX, py + this.size);
                    } else if (this.dir === 'right') {
                        px = this.x; py = this.y + (i * this.size);
                        ctx.moveTo(px - camX, py); ctx.lineTo(this.x + this.size - camX, py + this.size/2); ctx.lineTo(px - camX, py + this.size);
                    }
                }
                ctx.fill();
            }
        }

        class Flag {
            constructor(x, y, isGoal = false) {
                this.x = x; this.y = y; this.width = 30; this.height = 60;
                this.isGoal = isGoal;
                this.active = false;
            }
            draw(ctx, camX) {
                let color = this.isGoal ? COL_FLG_G : (this.active ? '#fff' : COL_FLG_B);
                let s = this.isGoal ? 1.5 : 1;
                ctx.fillStyle = '#8e44ad';
                ctx.fillRect(this.x - camX + 10, this.y + (this.height * (1 - s)), 5, this.height * s);
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.moveTo(this.x - camX + 15, this.y + (this.height * (1 - s)));
                ctx.lineTo(this.x - camX + 15 + (20 * s), this.y + 15 + (this.height * (1 - s)));
                ctx.lineTo(this.x - camX + 15, this.y + 30 + (this.height * (1 - s)));
                ctx.fill();
            }
        }

        class Enemy {
            constructor(x, y) {
                this.x = x; this.y = y; this.width = 30; this.height = 30;
                this.vx = 0; this.vy = 0;
                this.speed = 2.8;
                this.state = 'idle';
                this.chaseRange = 350;
            }
            update(player) {
                let dist = Math.abs(player.x - this.x);
                if (this.state === 'idle' && dist < this.chaseRange && Math.abs(player.y - this.y) < 120) {
                    this.state = 'chase';
                }
                if (this.state === 'chase') {
                    this.vx = (player.x > this.x) ? this.speed : -this.speed;
                }
                this.vy += GRAVITY;
                this.x += this.vx;
                this.y += this.vy;
                
                // 地面判定
                for (let plat of platforms) {
                    if (rectIntersect(this, plat)) {
                        let oldY = this.y - this.vy;
                        if (oldY + this.height <= plat.y) {
                            this.y = plat.y - this.height;
                            this.vy = 0;
                        }
                    }
                }
            }
            draw(ctx, camX) {
                if (this.x + this.width < camX || this.x > camX + vWidth) return;
                ctx.fillStyle = COL_ENM;
                ctx.fillRect(this.x - camX, this.y, this.width, this.height);
                // 怒り目
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x - camX + 5, this.y + 8, 6, 6);
                ctx.fillRect(this.x - camX + 19, this.y + 8, 6, 6);
            }
        }

        // --- ステージ生成 ---
        function createLevel() {
            platforms = []; spikes = []; checkpoints = []; enemies = [];
            
            // 1. スタート
            platforms.push(new Platform(0, V_HEIGHT - 40, 250, 40));
            
            // 2. 最初のトゲの谷
            platforms.push(new Platform(380, V_HEIGHT - 40, 120, 40));
            spikes.push(new Spike(250, V_HEIGHT - 20, 7, 'up'));

            // 3. 壁キック地帯1（登りながらトゲを避ける）
            platforms.push(new Platform(560, V_HEIGHT - 160, 25, 160)); 
            platforms.push(new Platform(660, V_HEIGHT - 280, 25, 180)); 
            platforms.push(new Platform(560, V_HEIGHT - 400, 25, 140)); 
            platforms.push(new Platform(500, V_HEIGHT - 400, 60, 15));  
            spikes.push(new Spike(585, V_HEIGHT - 150, 4, 'left')); // 壁の横トゲ

            // 4. チェックポイント1
            platforms.push(new Platform(720, V_HEIGHT - 120, 160, 15));
            checkpoints.push(new Flag(750, V_HEIGHT - 180));
            
            // 5. 天井トゲ通路
            platforms.push(new Platform(960, V_HEIGHT - 100, 40, 15));
            platforms.push(new Platform(1080, V_HEIGHT - 120, 40, 15));
            platforms.push(new Platform(1200, V_HEIGHT - 100, 40, 15));
            platforms.push(new Platform(940, 0, 340, 120)); // 天井
            spikes.push(new Spike(960, 120, 15, 'down')); // 天井トゲ

            // 6. チェックポイント2 + 落下壁キック
            platforms.push(new Platform(1360, V_HEIGHT - 160, 150, 160));
            checkpoints.push(new Flag(1390, V_HEIGHT - 220));

            platforms.push(new Platform(1620, V_HEIGHT - 320, 30, 320)); 
            platforms.push(new Platform(1750, V_HEIGHT - 450, 30, 350)); 
            spikes.push(new Spike(1360, V_HEIGHT - 20, 20, 'up')); // 底一面トゲ

            // 7. 突進敵地帯
            platforms.push(new Platform(1900, V_HEIGHT - 40, 500, 40));
            enemies.push(new Enemy(2350, V_HEIGHT - 70));
            spikes.push(new Spike(2080, V_HEIGHT - 60, 3, 'up')); // 避けた先にあるトゲ

            platforms.push(new Platform(2480, V_HEIGHT - 120, 60, 15)); 

            // 8. ラスト超難関壁キック
            platforms.push(new Platform(2640, V_HEIGHT - 380, 25, 380));
            spikes.push(new Spike(2615, V_HEIGHT - 280, 6, 'right')); // 右向きトゲ
            platforms.push(new Platform(2760, V_HEIGHT - 450, 25, 360));
            spikes.push(new Spike(2665, V_HEIGHT - 400, 10, 'left')); // 左向きトゲ

            // 9. ゴール
            platforms.push(new Platform(2920, V_HEIGHT - 40, 250, 40));
            goal = new Flag(3050, V_HEIGHT - 100, true);
        }

        // --- ループと衝突判定 ---
        function rectIntersect(r1, r2) {
            return !(r2.x >= r1.x + r1.width || r2.x + r2.width <= r1.x || r2.y >= r1.y + r1.height || r2.y + r2.height <= r1.y);
        }

        function updateCollisions() {
            player.onGround = false; player.onWall = false; player.wallDir = 0;

            for (let plat of platforms) {
                if (rectIntersect(player, plat)) {
                    let oldX = player.x - player.vx;
                    let oldY = player.y - player.vy;

                    if (oldY + player.height <= plat.y) {
                        player.y = plat.y - player.height; player.vy = 0; player.onGround = true; player.canDoubleJump = true;
                    } else if (oldY >= plat.y + plat.height) {
                        player.y = plat.y + plat.height; player.vy = GRAVITY;
                    }

                    if (rectIntersect(player, plat)) {
                        if (oldX + player.width <= plat.x) {
                            player.x = plat.x - player.width; player.vx = 0; player.onWall = true; player.wallDir = 1;
                        } else if (oldX >= plat.x + plat.width) {
                            player.x = plat.x + plat.width; player.vx = 0; player.onWall = true; player.wallDir = -1;
                        }
                    }
                }
            }

            // トゲ判定
            let s = 3;
            let hBox = { x: player.x + s, y: player.y + s, width: player.width - s*2, height: player.height - s*2 };
            for (let spike of spikes) {
                if (rectIntersect(hBox, spike)) { killPlayer(); break; }
            }

            // チェックポイント・敵・ゴール
            for (let cp of checkpoints) {
                if (!cp.active && rectIntersect(player, cp)) {
                    checkpoints.forEach(c => c.active = false); cp.active = true;
                    currentSpawnPoint = { x: cp.x, y: cp.y + cp.height - player.height };
                }
            }
            for (let e of enemies) { if (rectIntersect(player, e)) killPlayer(); }
            if (rectIntersect(player, goal)) gameClear();
        }

        function killPlayer() {
            player.isDead = true; deathCount++; uiDeaths.innerText = deathCount;
            setTimeout(() => {
                player = new Player(currentSpawnPoint.x, currentSpawnPoint.y);
                camera.x = player.x - vWidth / 3;
            }, 400);
        }

        function gameLoop() {
            if (currentGameState !== GameState.PLAYING) return;
            
            player.update();
            updateCollisions();
            if (player.y > V_HEIGHT + 150) killPlayer();
            enemies.forEach(e => e.update(player));

            // カメラ追従
            let targetCamX = player.x - vWidth / 3;
            if (targetCamX < 0) targetCamX = 0;
            if (targetCamX > worldWidth - vWidth) targetCamX = worldWidth - vWidth;
            camera.x += (targetCamX - camera.x) * 0.1;

            // 描画
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            
            // 画面いっぱいに広げるためのスケーリング倍率
            const scale = canvas.height / V_HEIGHT;
            ctx.scale(scale, scale);

            // 背景
            ctx.fillStyle = COL_BG;
            ctx.fillRect(0, 0, vWidth, V_HEIGHT);

            // 各種オブジェクト描画
            platforms.forEach(p => p.draw(ctx, camera.x));
            spikes.forEach(s => s.draw(ctx, camera.x));
            checkpoints.forEach(c => c.draw(ctx, camera.x));
            enemies.forEach(e => e.draw(ctx, camera.x));
            goal.draw(ctx, camera.x);
            player.draw(ctx, camera.x);
            
            ctx.restore();
            requestAnimationFrame(gameLoop);
        }

        // --- 全画面リサイズ処理の要 ---
        function resizeCanvas() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            // Canvasの描画解像度を画面サイズぴったりにする
            canvas.width = w;
            canvas.height = h;
            
            // 画面の縦横比から、ゲーム内の仮想横幅（vWidth）をリアルタイム計算
            // これにより、画面がどれだけ横に広くても引き伸ばされず、視野が広がります
            const scale = h / V_HEIGHT;
            vWidth = w / scale;

            if ('ontouchstart' in window) {
                document.getElementById('controller').style.display = 'flex';
            }
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', resizeCanvas);

        // 操作
        window.addEventListener('keydown', e => { 
            keys[e.key] = true; 
            if(['ArrowUp','w',' '].includes(e.key)) { e.preventDefault(); player.jump(); } 
        });
        window.addEventListener('keyup', e => { keys[e.key] = false; });

        function setupTouch() {
            const l = document.getElementById('btn-left'), r = document.getElementById('btn-right'), j = document.getElementById('btn-jump');
            l.addEventListener('touchstart', (e) => { e.preventDefault(); touchControls.left = true; });
            l.addEventListener('touchend', (e) => { e.preventDefault(); touchControls.left = false; });
            r.addEventListener('touchstart', (e) => { e.preventDefault(); touchControls.right = true; });
            r.addEventListener('touchend', (e) => { e.preventDefault(); touchControls.right = false; });
            j.addEventListener('touchstart', (e) => { e.preventDefault(); player.jump(); });
        }

        function startGame() {
            deathCount = 0; uiDeaths.innerText = "0";
            currentSpawnPoint = { x: 60, y: V_HEIGHT - 100 };
            player = new Player(currentSpawnPoint.x, currentSpawnPoint.y);
            camera.x = 0;
            createLevel();
            document.getElementById('msg-screen').style.display = 'none';
            currentGameState = GameState.PLAYING;
            gameLoop();
        }

        function gameClear() {
            currentGameState = GameState.CLEAR;
            document.getElementById('msg-screen').style.display = 'flex';
            document.getElementById('msg-title').innerText = "🎉 STAGE CLEAR !!";
            document.getElementById('msg-title').style.color = COL_FLG_G;
            document.getElementById('msg-body').innerHTML = `伝説のハードステージを突破した！<br>☠ DEATHS: ${deathCount}`;
            document.getElementById('start-btn').innerText = "もう一度挑戦";
        }

        resizeCanvas();
        setupTouch();
        msgScreen.style.display = 'flex';
    </script>
</body>
</html>
